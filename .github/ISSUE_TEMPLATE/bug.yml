name: "Bug"
description: Something is broken or behaves unexpectedly
labels: ["type: bug", "priority: high"]
body:

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "critical — blocker"
        - "high — current sprint"
        - "medium — normal"
        - "low — minor"
      default: 1
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      multiple: true
      options:
        - "document (pkg/document)"
        - "protocol (pkg/protocol)"
        - "transport (pkg/transport)"
        - "identity (pkg/identity)"
        - "negotiation (pkg/negotiation)"
        - "gateway (internal/gateway)"
        - "cli (cmd/aga)"
        - "ci"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear summary of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: Include error messages, stack traces, or wrong output.
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: "go version go1.24.2 linux/amd64"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Related issues, recent commits that may have introduced this, workarounds.
