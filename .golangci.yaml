version: "2"

linters:
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          allow:
            - $gostd
            - github.com/valpere/aga2aga
            - gopkg.in/yaml.v3
            - github.com/stretchr/testify

    tagliatelle:
      case:
        rules:
          yaml: snake

    cyclop:
      max-complexity: 15

    varnamelen:
      ignore-names:
        - tc
        - tt
        - ok
        - id

    exhaustruct:
      exclude:
        - "^github\\.com/valpere/aga2aga/pkg/document\\.Envelope$"
        - "^github\\.com/valpere/aga2aga/pkg/document\\.Document$"

  exclusions:
    rules:
      # err113: dynamic errors in UnmarshalYAML are intentional — no useful sentinel value.
      - path: "types\\.go"
        linters: [err113]
        text: "StringOrList"
      # exhaustive: switch on yaml.Kind — default case already handles unknown nodes correctly.
      - path: "types\\.go"
        linters: [exhaustive]
      # goconst in tests: repeated literals improve readability in fixture-heavy tests.
      - path: "_test\\.go"
        linters: [goconst]
      # wrapcheck: pkg/document wraps errors from yaml.v3 with fmt.Errorf+%w, which is correct.
      - path: "pkg/document"
        linters: [wrapcheck]
      # errcheck: defer f.Close() on read-only CLI file opens — close errors are harmless here.
      - path: "cmd/aga2aga"
        linters: [errcheck]
        text: "f\\.Close"
      # errcheck: fmt.Fprint*/fmt.Fprintln to stdout/stderr in CLI commands — checking print
      # errors in a terminal CLI adds noise without value (pipe failures surface elsewhere).
      - path: "cmd/aga2aga"
        linters: [errcheck]
        text: "fmt\\.Fprint"
